name: Instagram Auto-Post

on:
  schedule:
    - cron: '0 10 * * *'   # 10:00 UTC ежедневно
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Запустить в режиме dry-run (без публикации)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Run script
        run: |
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            echo "🔍 Dry-run mode enabled"
            python src/post_to_instagram.py --dry-run
          else
            python src/post_to_instagram.py
          fi
        env:
          SOCIALPOSTER: ${{ secrets.SOCIALPOSTER }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
          PINTEREST_ACCESS_TOKEN: ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
