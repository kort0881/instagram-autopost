name: Instagram Auto-Post

on:
  schedule:
    - cron: '0 10 * * *'   # 10:00 UTC ежедневно
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Запустить в режиме dry-run (без публикации)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      prepare_only:
        description: 'Только подготовка (DeepSeek mock, без Agnes и Instagram)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  PYTHON_VERSION: '3.12'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check required secrets
        env:
          IG_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          IG_TOKEN_OLD: ${{ secrets.SOCIALPOSTER }}
          USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          AGNES: ${{ secrets.AGNES_API_KEY }}
          DS_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          TOKEN_VAL="${IG_TOKEN:-$IG_TOKEN_OLD}"
          MISSING=""
          PREPARE="${{ github.event.inputs.prepare_only }}"
          [ "$PREPARE" != "true" ] && {
            [ -z "$TOKEN_VAL" ] && MISSING="$MISSING INSTAGRAM_ACCESS_TOKEN"
            [ -z "$USER_ID" ] && MISSING="$MISSING INSTAGRAM_USER_ID"
            [ -z "$AGNES" ] && MISSING="$MISSING AGNES_API_KEY"
          }
          [ -z "$DS_KEY" ] && echo "ℹ️  DEEPSEEK_API_KEY not set — LLM will use mock mode"
          if [ -n "$MISSING" ]; then
            echo "❌ MISSING SECRETS:$MISSING"
            exit 1
          fi
          echo "✅ Secrets check passed"

      - name: Run script
        run: |
          PREPARE="${{ github.event.inputs.prepare_only }}"
          DRY="${{ github.event.inputs.dry_run }}"
          ARGS=""
          [ "$DRY" == "true" ] && ARGS="$ARGS --dry-run"
          if [ "$PREPARE" == "true" ]; then
            echo "⏸️  PREPARE-ONLY mode"
            PREPARE_ONLY=true python src/post_to_instagram.py $ARGS
          elif [ "$DRY" == "true" ]; then
            echo "🔍 Dry-run mode enabled"
            python src/post_to_instagram.py --dry-run
          else
            python src/post_to_instagram.py
          fi
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          SOCIALPOSTER: ${{ secrets.SOCIALPOSTER }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          AGNES_API_KEY: ${{ secrets.AGNES_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          PREPARE_ONLY: ${{ github.event.inputs.prepare_only || 'false' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
